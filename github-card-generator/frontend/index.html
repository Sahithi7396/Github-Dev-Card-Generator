<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

    <title>GitHub Dev Card Generator</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white font-sans">

    <div id="root"></div>

    <script type="text/babel">

        function App() {

            const [username, setUsername] = React.useState('');

            const [cardUrl, setCardUrl] = React.useState(null);

            const generateCard = async () => {

                try {

                    const response = await fetch(
                        `http://localhost:8080/generate?username=${username}`,
                        {
                            method: "POST"
                        }
                    );

                    const data = await response.json();

                    console.log(data);

                    setCardUrl(
                        `http://localhost:8080${data.card_path}`
                    );

                } catch (error) {

                    console.error("Error:", error);

                    alert("Something went wrong");
                }
            };

            return (

                <div className="
                    min-h-screen
                    flex
                    flex-col
                    items-center
                    justify-center
                    bg-gray-900
                    p-6
                ">

                    <h1 className="
                        text-4xl
                        font-bold
                        mb-8
                        text-center
                    ">
                        GitHub Dev Card Generator
                    </h1>

                    <div className="
                        flex
                        gap-4
                        mb-8
                    ">

                        <input
                            type="text"

                            placeholder="GitHub Username"

                            className="
                                px-4
                                py-2
                                rounded
                                bg-gray-800
                                border
                                border-gray-700
                                focus:outline-none
                                focus:border-blue-500
                            "

                            value={username}

                            onChange={(e) =>
                                setUsername(e.target.value)
                            }
                        />

                        <button
                            onClick={generateCard}

                            className="
                                px-6
                                py-2
                                bg-blue-600
                                rounded
                                hover:bg-blue-700
                                transition
                            "
                        >
                            Generate
                        </button>

                    </div>

                    {

                        cardUrl && (

                            <div className="
                                flex
                                justify-center
                                items-center
                            ">

                                <iframe
                                    src={cardUrl}

                                    className="
                                        w-[500px]
                                        h-[700px]
                                        rounded-2xl
                                        border
                                        border-gray-700
                                        shadow-2xl
                                        bg-white
                                    "
                                >
                                </iframe>

                            </div>
                        )
                    }

                </div>
            );
        }

        const root = ReactDOM.createRoot(
            document.getElementById('root')
        );

        root.render(<App />);

    </script>

</body>

</html>
